<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>D&D Light</title>
    <meta
      name="description"
      content="A lightweight visual fantasy adventure webapp prototype focused on fast character creation."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="D&D Light character creator">
      <section id="creatorStage" class="stage" aria-label="Character preview">
        <img class="stage-bg" src="assets/images/character-creation-bg.png" alt="">
        <div class="stage-shade"></div>

        <header class="topbar">
          <div>
            <p class="eyebrow">D&D Light</p>
            <h1>Create Hero</h1>
          </div>
          <button id="randomButton" class="icon-button" type="button" aria-label="Randomize character" title="Randomize">
            &#8635;
          </button>
        </header>

        <section class="hero-card" aria-live="polite">
          <div class="portrait-frame">
            <img id="portraitImage" class="portrait" src="assets/images/hero-fighter.png" alt="Current hero portrait">
            <div id="styleAura" class="color-aura"></div>
          </div>
          <div class="hero-summary">
            <p id="heroKicker">Human Fighter</p>
            <h2 id="heroName">The Ready Blade</h2>
          </div>
        </section>

        <section class="sheet-strip" aria-label="Character stats">
          <article>
            <span>Heart</span>
            <strong id="heartStat">8</strong>
          </article>
          <article>
            <span>Action</span>
            <strong id="actionStat">2</strong>
          </article>
          <article>
            <span>Luck</span>
            <strong id="luckStat">1</strong>
          </article>
        </section>
      </section>

      <section id="creatorControls" class="controls" aria-label="Character choices">
        <nav class="tabs" aria-label="Creation steps">
          <button class="tab is-active" type="button" data-panel="gender">Gender</button>
          <button class="tab" type="button" data-panel="style">Style</button>
          <button class="tab" type="button" data-panel="race">Race</button>
          <button class="tab" type="button" data-panel="class">Class</button>
        </nav>

        <div id="choicePanel" class="choice-panel"></div>

        <label class="name-field">
          <span>Name</span>
          <input id="characterName" type="text" maxlength="24" autocomplete="off" placeholder="Hero name">
        </label>

        <section class="party-strip" aria-label="Current party">
          <div class="party-heading">
            <strong>Party</strong>
            <span id="partyCount">0/4</span>
          </div>
          <div id="partySlots" class="party-slots"></div>
        </section>

        <footer class="bottom-actions">
          <button id="backButton" class="secondary-button" type="button">Back</button>
          <button id="nextButton" class="primary-button" type="button">Next</button>
        </footer>
        <footer class="bottom-actions party-actions">
          <button id="saveHeroButton" class="secondary-button" type="button">Add</button>
          <button id="startAdventureButton" class="primary-button" type="button">Start</button>
        </footer>
      </section>

      <section id="adventureStage" class="adventure-stage" aria-label="Adventure party" hidden>
        <img id="adventureBg" class="adventure-bg" src="assets/images/adventure/party-road.png" alt="">
        <div class="adventure-shade"></div>
        <header class="topbar adventure-topbar">
          <div>
            <p class="eyebrow">D&D Light</p>
            <h1 id="adventureTitle">The Old Road</h1>
          </div>
          <button id="backToCreatorButton" class="icon-button" type="button" aria-label="Back to character creator" title="Back">
            &#8592;
          </button>
        </header>

        <nav class="adventure-tabs" aria-label="Adventure views">
          <button class="adventure-tab is-active" type="button" data-adventure-view="party">Party</button>
          <button class="adventure-tab" type="button" data-adventure-view="map">Map</button>
          <button class="adventure-tab" type="button" data-adventure-view="location">Location</button>
        </nav>

        <section id="partyView" class="adventure-party adventure-view" aria-live="polite">
          <div id="adventureParty" class="adventure-lineup"></div>
        </section>

        <section id="mapView" class="map-view adventure-view" hidden>
          <div class="map-frame">
            <img src="assets/images/adventure/fantasyland-map-wide.png" alt="Fantasyland map">
            <div id="mapPoints" class="map-points"></div>
          </div>
        </section>

        <section id="locationView" class="location-view adventure-view" hidden>
          <article class="location-card">
            <p id="locationType" class="eyebrow">Town</p>
            <h2 id="locationName">Sunspire</h2>
            <p id="locationDescription">A bright hill town watching the old roads.</p>
          </article>
        </section>

        <footer class="adventure-panel">
          <p id="adventureSummary">Your party gathers at the first marker.</p>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
